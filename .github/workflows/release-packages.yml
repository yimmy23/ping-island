name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to package and publish, for example v1.2.3
        required: true
        type: string
      draft:
        description: Keep the GitHub Release in draft state
        required: false
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-packages-${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish unsigned packages
    runs-on: macos-15
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}
      RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Build unsigned DMG and ZIP packages
        run: ./scripts/package-unsigned.sh

      - name: Collect release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          dmg_assets=(releases/unsigned/*.dmg)
          zip_assets=(releases/unsigned/*.zip)

          if [ "${#dmg_assets[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one DMG asset in releases/unsigned, found ${#dmg_assets[@]}"
            exit 1
          fi

          if [ "${#zip_assets[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one ZIP asset in releases/unsigned, found ${#zip_assets[@]}"
            exit 1
          fi

          app_path="build/unsigned/DerivedData/Build/Products/Release/Ping Island.app"
          if [ ! -d "$app_path" ]; then
            echo "::error::Expected built app bundle at $app_path"
            exit 1
          fi

          version=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$app_path/Contents/Info.plist")
          build=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$app_path/Contents/Info.plist")
          expected_tag="v$version"
          notes_path="releases/notes/$version.md"

          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match app version $version"
            exit 1
          fi

          if [ -f "$notes_path" ]; then
            has_notes=true
          else
            has_notes=false
          fi

          {
            echo "version=$version"
            echo "build=$build"
            echo "dmg_path=${dmg_assets[0]}"
            echo "zip_path=${zip_assets[0]}"
            echo "notes_path=$notes_path"
            echo "has_notes=$has_notes"
            echo "release_title=Ping Island $RELEASE_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PingIsland-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.build }}-release-packages
          path: |
            ${{ steps.meta.outputs.dmg_path }}
            ${{ steps.meta.outputs.zip_path }}
          if-no-files-found: error

      - name: Prepare release notes body
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$RUNNER_TEMP/release-notes.md"

          if [ "${{ steps.meta.outputs.has_notes }}" = "true" ]; then
            cp "${{ steps.meta.outputs.notes_path }}" "$notes_file"
          else
            printf 'Release build for %s.\n\nIncluded assets:\n- %s\n- %s\n' \
              "$RELEASE_TAG" \
              "$(basename "${{ steps.meta.outputs.dmg_path }}")" \
              "$(basename "${{ steps.meta.outputs.zip_path }}")" \
              > "$notes_file"
          fi

          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          repo="$GITHUB_REPOSITORY"

          retry() {
            local attempts=0
            local max_attempts=3
            local delay=5

            until "$@"; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge "$max_attempts" ]; then
                return 1
              fi

              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          ensure_release_exists() {
            gh release view "$RELEASE_TAG" --repo "$repo" >/dev/null 2>&1 && return 0

            # Create the release as a draft first so a failed asset upload can be resumed
            # by rerunning the workflow instead of leaving gh release create half-finished.
            gh release create "$RELEASE_TAG" \
              --repo "$repo" \
              --verify-tag \
              --draft \
              --title "${{ steps.meta.outputs.release_title }}" \
              --notes-file "${{ steps.notes.outputs.file }}"
          }

          retry ensure_release_exists

          retry gh release upload "$RELEASE_TAG" \
            "${{ steps.meta.outputs.dmg_path }}" \
            "${{ steps.meta.outputs.zip_path }}" \
            --repo "$repo" \
            --clobber

          retry gh release edit "$RELEASE_TAG" \
            --repo "$repo" \
            --title "${{ steps.meta.outputs.release_title }}" \
            --notes-file "${{ steps.notes.outputs.file }}" \
            --draft="$RELEASE_DRAFT" \
            --prerelease="$RELEASE_PRERELEASE"

          gh release view "$RELEASE_TAG" --repo "$repo"
