name: PR Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build prototype test bundle
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/prototype-ci"
          swift build --package-path Prototype --build-tests --verbose \
            2>&1 | tee "$RUNNER_TEMP/prototype-ci/01-build-tests.log"

      - name: List prototype tests
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/prototype-ci"
          swift test --package-path Prototype list \
            2>&1 | tee "$RUNNER_TEMP/prototype-ci/02-list-tests.log"

      - name: Run prototype tests
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/prototype-ci"
          swift test --package-path Prototype --skip-build --verbose \
            2>&1 | tee "$RUNNER_TEMP/prototype-ci/03-run-tests.log"

      - name: Run Xcode unit tests
        run: >
          xcodebuild
          -project PingIsland.xcodeproj
          -scheme PingIsland
          -configuration Debug
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/DerivedData"
          -resultBundlePath "$RUNNER_TEMP/PingIslandTests.xcresult"
          CODE_SIGNING_ALLOWED=NO
          test
          -only-testing:PingIslandTests

      - name: Upload prototype diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Prototype-ci-logs
          path: ${{ runner.temp }}/prototype-ci
          if-no-files-found: ignore

      - name: Upload unit test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: PingIslandTests-xcresult
          path: ${{ runner.temp }}/PingIslandTests.xcresult
          if-no-files-found: ignore
